<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Beaba.ai — Informações sobre Câncer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
    background: #d6eef3;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  /* BOX WRAPPER */
  .app-box {
    width: 100%;
    max-width: 520px;
    background: #fff;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.13);
    display: flex;
    flex-direction: column;
    height: 88vh;
    max-height: 800px;
  }

  /* HEADER */
  header {
    background: #3bbfce;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  header .title { color: #fff; }
  header .title h1 { font-size: 1.2rem; font-weight: 700; line-height: 1.2; }
  header .title p { font-size: 0.94rem; opacity: 0.9; }

  /* MAIN LAYOUT */
  .container {
    display: flex;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  /* CANCER TYPE FILTERS */
  .filters {
    padding: 12px 16px 8px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .filter-btn {
    background: #fff;
    border: 1.5px solid #3bbfce;
    color: #3bbfce;
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all .15s;
    font-weight: 500;
  }
  .filter-btn:hover, .filter-btn.active {
    background: #3bbfce;
    color: #fff;
  }

  /* MESSAGES */
  #messages {
    flex: 1;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow-y: auto;
  }

  .msg { display: flex; gap: 8px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--avatar-color, #3bbfce); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .msg.user .avatar { background: #e8f6f8; }

  .bubble {
    max-width: 82%;
    padding: 11px 14px;
    border-radius: 16px;
    font-size: 0.92rem;
    line-height: 1.55;
    color: #2d3748;
  }
  .msg.bot .bubble {
    background: #eaf5f7;
    border-radius: 4px 16px 16px 16px;
    box-shadow: none;
  }
  .msg.user .bubble {
    background: #3bbfce;
    color: #fff;
    border-radius: 16px 4px 16px 16px;
  }

  .bubble .cancer-tag {
    display: inline-block;
    font-size: 0.68rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .bubble img { width: 100%; max-width: 220px; display: block; margin: 10px auto 4px; border-radius: 12px; }
  .bubble .source { font-size: 0.72rem; color: #8a9bb0; margin-top: 8px; font-style: italic; }
  .bubble strong { font-weight: 700; }

  /* SUGGESTIONS */
  #suggestions {
    padding: 8px 16px 4px;
  }
  #suggestions p {
    font-size: 0.8rem;
    color: #7a8fa0;
    margin-bottom: 9px;
    font-weight: 500;
  }
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    max-height: 72px;
    overflow: hidden;
  }
  .chip {
    background: #fff;
    border: 1.5px solid #3bbfce;
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 0.78rem;
    color: #3bbfce;
    cursor: pointer;
    transition: all .15s;
    font-weight: 500;
  }
  .chip:hover { background: #e8f6f8; }

  /* TYPING */
  .typing { display: flex; gap: 5px; padding: 8px 12px; align-items: center; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #3bbfce; animation: bounce .8s infinite; }
  .dot:nth-child(2) { animation-delay: .15s; }
  .dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

  /* INPUT */
  .input-area {
    background: #fff;
    border-top: 1px solid #e0eef2;
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  #userInput {
    flex: 1;
    border: 1.5px solid #c8e6eb;
    border-radius: 22px;
    padding: 10px 16px;
    font-size: 0.9rem;
    outline: none;
    transition: border-color .15s;
    background: #f7fbfc;
  }
  #userInput:focus { border-color: #3bbfce; background: #fff; }
  #sendBtn {
    background: #3bbfce;
    border: none;
    border-radius: 50%;
    width: 42px; height: 42px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
    flex-shrink: 0;
  }
  #sendBtn:hover { background: #2da8b8; }
  #sendBtn svg { color: #fff; }

  /* FEEDBACK */
  .feedback-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 2px 0 4px 40px;
    font-size: 0.75rem;
    color: #9ab;
  }
  .feedback-row button {
    background: none;
    border: 1px solid #ddd;
    border-radius: 12px;
    padding: 2px 8px;
    font-size: 0.82rem;
    cursor: pointer;
    transition: all .15s;
    width: auto;
    height: auto;
    border-radius: 12px;
  }
  .feedback-row button:hover { background: #f0f8fa; border-color: #3bbfce; }

  /* DISCLAIMER */
  .disclaimer {
    font-size: 0.7rem;
    color: #9ab;
    text-align: center;
    padding: 4px 16px 10px;
  }
</style>
</head>
<body>
<div class="app-box">

<header>
  <img src="Logo.svg" width="48" height="48" alt="Beaba" style="flex-shrink:0;">
  <div class="title">
    <h1>Beaba.ia</h1>
    <p>O be-a-bá do câncer com inteligência artificial.</p>
  </div>
</header>

<div class="container">

  <!-- FILTER BUTTONS -->
  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="todos" data-color="#3bbfce">todos</button>
    <button class="filter-btn" data-filter="infantil" data-color="#3bbfce">infantojuvenil</button>
    <button class="filter-btn" data-filter="mama" data-color="rgb(255 143 178)" style="border-color:rgb(255 143 178);color:rgb(255 143 178);">mama</button>
    <button class="filter-btn" data-filter="prostata" data-color="rgb(120 193 233)" style="border-color:rgb(120 193 233);color:rgb(120 193 233);">próstata</button>
    <button class="filter-btn" data-filter="leucemia" data-color="rgb(255 180 71)" style="border-color:rgb(255 180 71);color:rgb(255 180 71);">leucemia</button>
    <button class="filter-btn" data-filter="intestino" data-color="rgb(74 123 191)" style="border-color:rgb(74 123 191);color:rgb(74 123 191);">intestino</button>
    <button class="filter-btn" data-filter="pulmao" data-color="rgb(166 161 161)" style="border-color:rgb(166 161 161);color:rgb(166 161 161);">pulmão</button>
    <button class="filter-btn" data-filter="utero" data-color="rgb(187 145 234)" style="border-color:rgb(187 145 234);color:rgb(187 145 234);">útero</button>
  </div>

  <!-- MESSAGES -->
  <div id="messages"></div>

  <!-- SUGGESTIONS -->
  <div id="suggestions">
    <p>Perguntas frequentes:</p>
    <div class="chips" id="chips"></div>
  </div>

  <div class="disclaimer">
    As informações aqui são educativas e não substituem a consulta médica.
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <input type="text" id="userInput" placeholder="Qual é a sua dúvida?" autocomplete="off" />
  <button id="sendBtn" onclick="handleSend()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  </button>
</div>

<script>
// ─── KNOWLEDGE BASE ───────────────────────────────────────────────────────────
// Fontes: Guia Beaba do Câncer 4ª ed. + INCA (gov.br/inca)
const knowledge = [

  // ════════════════════════════════════════════════
  // GERAL / O QUE É CÂNCER
  // ════════════════════════════════════════════════
  {
    id: 'cancer-o-que-e',
    type: 'geral',
    typeLabel: '🌟 Geral',
    typeColor: '#3bbfce',
    keys: ['o que e cancer','o que é câncer','o que e o cancer','o que e um cancer','cancer e uma doenca','celulas cancerigas','celulas cancerígenas'],
    title: 'O que é câncer?',
    text: `O <strong>câncer</strong> é o nome que damos para um grupo de doenças em que células do nosso próprio corpo começam a crescer de forma desordenada — como se perdessem o freio. 🔬\n\nNormalmente, nossas células crescem, fazem seu trabalho e se renovam em um ritmo certinho. No câncer, algo muda nesse processo: as células se multiplicam demais, formam uma massa (o <strong>tumor</strong>) e podem se espalhar para outras partes do corpo.\n\nImportante saber: existem <strong>mais de 100 tipos diferentes</strong> de câncer, cada um com características, tratamentos e chances de cura próprias. Muitos têm altíssima taxa de cura quando detectados cedo! 💪`,
    source: 'Guia Beaba do Câncer, 4ª ed. · INCA'
  },
  {
    id: 'tratamento-geral',
    type: 'geral',
    typeLabel: '🌟 Geral',
    typeColor: '#3bbfce',
    keys: ['tratamento','quimioterapia','radioterapia','imunoterapia','hormonioterapia','cirurgia','tipos de tratamento'],
    title: 'Quais são os tipos de tratamento?',
    text: `Os principais tipos de tratamento do câncer são:\n\n<strong>💊 Quimioterapia</strong> — remédios que combatem as células cancerígenas. Podem ser tomados pela boca ou pela veia.\n\n<strong>☢️ Radioterapia</strong> — raios de alta energia direcionados ao tumor, como uma "lupa" de precisão.\n\n<strong>🔪 Cirurgia</strong> — remoção do tumor pelo médico. Muitas vezes é o primeiro passo do tratamento.\n\n<strong>🧬 Imunoterapia</strong> — ativa o sistema de defesa do próprio corpo para reconhecer e atacar o câncer.\n\n<strong>💉 Hormonioterapia</strong> — bloqueia hormônios que alimentam certos tumores (muito usado no câncer de mama e próstata).\n\nO médico pode usar um ou mais tratamentos ao mesmo tempo ou em sequência — sempre pensando no melhor para cada pessoa. 🌱`,
    source: 'Guia Beaba do Câncer, 4ª ed.'
  },
  {
    id: 'cabelo',
    type: 'geral',
    typeLabel: '🌟 Geral',
    typeColor: '#3bbfce',
    keys: ['cabelo','queda de cabelo','alopecia','vai perder o cabelo','perder cabelo'],
    title: 'A quimioterapia causa queda de cabelo?',
    text: `A queda de cabelo (<strong>alopecia</strong>) é um dos efeitos colaterais mais conhecidos da quimioterapia — mas não acontece com todos os tratamentos nem com todos os remédios. 💆\n\nAlguns quimioterápicos afetam os folículos capilares porque, assim como as células cancerígenas, eles também se dividem rapidamente. O cabelo pode começar a cair entre 2 a 4 semanas após o início do tratamento.\n\nA <strong>boa notícia</strong>: o cabelo volta a crescer depois que o tratamento termina! 🌱 Em alguns casos, a textura pode ser um pouco diferente por um tempo — isso varia de pessoa para pessoa.\n\nExistem técnicas como a <strong>touca de resfriamento</strong> que podem reduzir a queda em alguns tipos de quimioterapia — pergunte ao médico se essa opção é adequada.`,
    source: 'Guia Beaba do Câncer, 4ª ed.'
  },
  {
    id: 'metastase',
    type: 'geral',
    typeLabel: '🌟 Geral',
    typeColor: '#3bbfce',
    keys: ['metastase','metástase','espalhou','espalhado','disseminou'],
    title: 'O que é metástase?',
    text: `<strong>Metástase</strong> é quando células cancerígenas se desprendem do tumor original e viajam pelo sangue ou linfa para outros órgãos, onde formam novos tumores. 🌊\n\nExemplo: um câncer de mama que se espalha para os pulmões é chamado de metástase pulmonar de câncer de mama — não é um "câncer de pulmão", é o mesmo câncer em outro lugar.\n\nQuando a metástase está presente, o tratamento muda de objetivo: em vez de curar, o foco muitas vezes é <strong>controlar a doença</strong>, reduzir sintomas e manter a qualidade de vida — o que hoje é possível por muito mais tempo do que no passado, graças aos avanços nos tratamentos. 💙`,
    source: 'Guia Beaba do Câncer, 4ª ed. · INCA'
  },
  {
    id: 'estadiamento',
    type: 'geral',
    typeLabel: '🌟 Geral',
    typeColor: '#3bbfce',
    keys: ['estadiamento','estagio do cancer','estágio do câncer','estadio do cancer','fase do cancer','fase do câncer','o que e estagio','o que é estágio','stage'],
    title: 'O que é estágio / estadiamento?',
    text: `O <strong>estadiamento</strong> é a forma que os médicos usam para descrever o quanto o câncer se desenvolveu e se espalhou. É como um "mapa" da doença. 🗺️\n\nA escala mais usada vai de <strong>I a IV</strong>:\n\n🟢 <strong>Estágio I</strong> — tumor pequeno, localizado. Altas chances de cura.\n🟡 <strong>Estágio II</strong> — tumor maior, mas ainda bem localizado.\n🟠 <strong>Estágio III</strong> — tumor se espalhou para linfonodos ou tecidos próximos.\n🔴 <strong>Estágio IV</strong> — metástase (espalhou para outros órgãos). Tratamento com foco em controle.\n\nO estadiamento determina o tratamento mais adequado. Lembre: mesmo estágios avançados têm tratamento e muitas pessoas vivem anos com qualidade de vida! 💪`,
    source: 'INCA · Guia Beaba do Câncer, 4ª ed.'
  },

  // ════════════════════════════════════════════════
  // INFANTOJUVENIL
  // ════════════════════════════════════════════════
  {
    id: 'infantil-o-que-e',
    type: 'infantil',
    typeLabel: '🐻 Infantil',
    typeColor: '#3bbfce',
    keys: ['cancer infantil','câncer infantil','cancer em crianca','câncer em criança','cancer pediatrico','crianca com cancer','criança com câncer','leucemia infantil','tumor infantil'],
    title: 'Câncer infantil: o que é?',
    text: `O <strong>câncer infantojuvenil</strong> ocorre em crianças e adolescentes até os 19 anos. É diferente do câncer em adultos: os tipos mais comuns, as causas e até a resposta ao tratamento são bem distintos. 🐻\n\nA <strong>boa notícia</strong>: o câncer infantil tem taxa de cura que pode ultrapassar <strong>80%</strong> quando diagnosticado e tratado em centros especializados. É um dos tipos de câncer com melhor resposta ao tratamento!\n\nOs tipos mais frequentes em crianças são:\n• <strong>Leucemias</strong> (câncer do sangue) — o mais comum\n• <strong>Tumores do sistema nervoso central</strong> (ex: meduloblastoma)\n• <strong>Linfomas</strong>\n• <strong>Tumor de Wilms</strong> (rim)\n• <strong>Neuroblastoma</strong> (sistema nervoso)`,
    source: 'Guia Beaba do Câncer, 4ª ed. · INCA'
  },
  {
    id: 'infantil-sinais',
    type: 'infantil',
    typeLabel: '🐻 Infantil',
    typeColor: '#3bbfce',
    keys: ['sinais cancer criança','sintomas crianca','sinais criança','como saber se crianca tem cancer','febre sem causa','olho branco','reflexo branco'],
    title: 'Sinais de alerta no câncer infantil',
    text: `O câncer infantil muitas vezes se parece com doenças comuns no começo. Por isso, é importante ficar atento a sinais que persistem ou que parecem estranhos. ⚠️\n\nFique de olho em:\n• <strong>Febre sem causa aparente</strong> que não passa\n• <strong>Palidez intensa</strong> e cansaço excessivo\n• <strong>Manchas roxas</strong> (hematomas) sem bater em nada\n• <strong>Dores de cabeça persistentes</strong>, especialmente de manhã\n• <strong>Inchaço no pescoço, axila ou virilha</strong> (linfonodos)\n• <strong>Reflexo branco no olho</strong> em fotos com flash (sinal de retinoblastoma)\n• <strong>Perda de peso</strong> sem motivo\n• <strong>Mancar ou dor nos ossos</strong> sem causa aparente\n\nEsses sinais não significam necessariamente câncer — mas devem ser avaliados por um médico! 🩺`,
    source: 'Guia Beaba do Câncer, 4ª ed. · INCA'
  },
  {
    id: 'infantil-tratamento',
    type: 'infantil',
    typeLabel: '🐻 Infantil',
    typeColor: '#3bbfce',
    keys: ['tratamento criança','tratar criança com cancer','escola durante tratamento','criança quimio','crianca quimioterapia'],
    title: 'Como é o tratamento do câncer infantil?',
    text: `O tratamento do câncer em crianças é feito em centros de oncologia pediátrica, com uma equipe multidisciplinar: oncologista, enfermeiros, psicólogos, nutricionistas e muito mais. 💛\n\nOs tipos de tratamento mais usados em crianças são:\n• <strong>Quimioterapia</strong> — muito eficaz em câncer infantil\n• <strong>Radioterapia</strong> — com cuidados extras para não afetar o crescimento\n• <strong>Cirurgia</strong> — para remover tumores sólidos\n• <strong>Transplante de células-tronco</strong> — em casos específicos\n\n<strong>Sobre a escola:</strong> muitas crianças continuam estudando durante o tratamento, nos momentos em que estão bem! Algumas escolas têm programas de acompanhamento domiciliar. Manter a rotina escolar ajuda emocionalmente. 📚\n\nNo Brasil, o <strong>SUS</strong> oferece tratamento completo e gratuito para o câncer infantojuvenil.`,
    source: 'Guia Beaba do Câncer, 4ª ed. · INCA'
  },
  {
    id: 'medula',
    type: 'infantil',
    typeLabel: '🐻 Infantil',
    typeColor: '#3bbfce',
    keys: ['medula','transplante de medula','transplante medula ossea','biopsia de medula','punção lombar'],
    title: 'O que é transplante de medula óssea?',
    text: `A <strong>medula óssea</strong> é onde o nosso sangue é produzido — fica dentro dos ossos e fabrica glóbulos vermelhos, brancos e plaquetas. 🩸\n\nO <strong>transplante de medula óssea</strong> (ou transplante de células-tronco hematopoéticas) substitui a medula doente por células saudáveis — do próprio paciente (autólogo) ou de um doador (alogênico).\n\nComo é o processo:\n1️⃣ Quimioterapia intensa para eliminar as células doentes\n2️⃣ Infusão das células-tronco saudáveis pela veia\n3️⃣ Período de isolamento enquanto as células "pegam" e reconstroem o sangue\n\nÉ um tratamento sério, mas que salva muitas vidas — especialmente em leucemias e linfomas. O maior desafio é encontrar um <strong>doador compatível</strong>. Cadastre-se no REDOME! 💙`,
    source: 'Guia Beaba do Câncer, 4ª ed.'
  },

  // ════════════════════════════════════════════════
  // CÂNCER DE MAMA
  // ════════════════════════════════════════════════
  {
    id: 'mama-o-que-e',
    type: 'mama',
    typeLabel: '🌸 Mama',
    typeColor: 'rgb(255 143 178)',
    keys: ['cancer de mama','câncer de mama','tumor de mama','o que é cancer de mama'],
    title: 'O que é câncer de mama?',
    text: `O <strong>câncer de mama</strong> é causado pela multiplicação desordenada de células anormais na mama, que formam um tumor com potencial de se espalhar. 🌸\n\nÉ o tipo de câncer mais frequente entre as mulheres brasileiras (depois do câncer de pele não-melanoma), mas também ocorre em homens — neles, representa cerca de 1% dos casos.\n\nExistem vários subtipos de câncer de mama — alguns crescem rápido, outros lentamente. A <strong>maioria dos casos tem bom prognóstico</strong> quando tratados adequadamente e diagnosticados cedo. O SUS oferece tratamento completo e gratuito. 💪`,
    source: 'INCA · Beaba do Câncer de Mama',
    image: 'https://www.femama.org.br/site/wp-content/themes/femama/img/ilustracoes/tres-mulheres.svg'
  },
  {
    id: 'mama-sintomas',
    type: 'mama',
    typeLabel: '🌸 Mama',
    typeColor: 'rgb(255 143 178)',
    keys: ['sintomas mama','sinais mama','nodulo mama','nódulo mama','caroço mama','como saber se é cancer de mama'],
    title: 'Sinais e sintomas do câncer de mama',
    text: `O câncer de mama pode dar sinais. Fique atenta a: 🔍\n\n• <strong>Nódulo (caroço)</strong> na mama ou na axila — especialmente se for duro e fixo\n• <strong>Saída espontânea de líquido</strong> de um mamilo (sem apertar)\n• <strong>Mudança na pele</strong> da mama: vermelhidão, espessamento, aspecto de "casca de laranja"\n• <strong>Retração</strong> do mamilo ou da pele\n• <strong>Mama ficando maior</strong> progressivamente sem motivo\n• <strong>Ferida na pele</strong> que não cicatriza\n\nImportante: muitos caroços na mama <strong>não são câncer</strong> — podem ser cistos ou fibroadenomas benignos. Mas qualquer nódulo deve ser avaliado pelo médico. 🩺`,
    source: 'INCA · Beaba do Câncer de Mama',
    image: 'https://www.femama.org.br/site/wp-content/themes/femama/img/ilustracoes/sinaisesintomas/woman2.svg'
  },
  {
    id: 'mamografia',
    type: 'mama',
    typeLabel: '🌸 Mama',
    typeColor: 'rgb(255 143 178)',

    text: `<strong>HER2</strong> é uma proteína presente na superfície de algumas células mamárias. Quando está em excesso (<strong>HER2 positivo</strong>), o tumor tende a crescer mais rápido — mas também responde muito bem a medicamentos específicos como o <strong>trastuzumabe (Herceptin)</strong>. 🎯\n\nOs principais subtipos de câncer de mama são:\n\n🟡 <strong>Luminal A e B</strong> — crescem estimulados por hormônios (estrogênio/progesterona). Respondem à hormonioterapia.\n🔵 <strong>HER2 positivo</strong> — crescem por excesso de HER2. Respondem a terapia-alvo.\n🔴 <strong>Triplo negativo</strong> — não tem receptor hormonal nem HER2. É tratado principalmente com quimioterapia. Mais agressivo, mas com novos tratamentos chegando.\n\nSaber o subtipo é fundamental para escolher o melhor tratamento! 🧬`,

  {

    keys: ['fatores de risco prostata','risco prostata','hereditario prostata','historico familiar prostata','quem tem mais risco prostata','homens negros cancer'],
    title: 'Fatores de risco do câncer de próstata',
    text: `Conhecer os fatores de risco não significa que o câncer vai acontecer — mas ajuda a entender por que o acompanhamento médico regular é tão importante. 💙\n\n<strong>Idade:</strong> é o principal fator. A maioria dos casos ocorre após os 65 anos. Antes dos 50, é raro, mas possível.\n\n<strong>Histórico familiar:</strong> ter pai, irmão ou avô com câncer de próstata aumenta o risco — especialmente se o diagnóstico foi antes dos 60 anos.\n\n<strong>Raça:</strong> homens negros têm maior incidência e, muitas vezes, formas mais agressivas. Por isso o rastreamento precoce é ainda mais importante nessa população.\n\n<strong>Alimentação e peso:</strong> dietas ricas em gordura animal e obesidade podem estar associadas a formas mais agressivas da doença.`,

  {

    title: 'Sinais e sintomas do câncer de próstata',
    text: `O câncer de próstata nos estágios iniciais é <strong>silencioso</strong> — muitas vezes não dá nenhum sinal. Por isso o rastreamento regular é tão importante. ⚠️\n\nQuando os sintomas aparecem, costumam estar relacionados ao fluxo urinário:\n• Dificuldade para começar ou parar de urinar\n• <strong>Jato de urina fraco</strong> ou interrompido\n• Sensação de que a bexiga não esvaziou completamente\n• Necessidade frequente de urinar, especialmente à noite\n• Dor ou ardência ao urinar\n• Sangue na urina ou no sêmen\n\nImportante: esses sintomas também podem ser causados pela <strong>HPB</strong> (hiperplasia prostática benigna — aumento benigno da próstata), que é muito comum e não é câncer. Só o médico pode diferenciar. Em casos avançados, podem aparecer dores nos ossos ou na região lombar. 🩺`,

  {
    id: 'prostata-diagnostico',

    keys: ['diagnostico prostata','psa','toque retal','biopsia prostata','como diagnosticar prostata','exame prostata','antígeno prostático','antigenio prostatico'],
    title: 'Como é diagnosticado o câncer de próstata?',
    text: `O diagnóstico geralmente começa com dois exames simples: 🩺\n\n<strong>PSA (Antígeno Prostático Específico):</strong> exame de sangue que mede uma proteína produzida pela próstata. Valores elevados podem indicar câncer, mas também outras condições benignas — por isso o resultado sempre precisa ser avaliado pelo médico.\n\n<strong>Toque retal:</strong> permite ao médico sentir o tamanho, a textura e possíveis irregularidades na próstata. É rápido, seguro e fornece informações que o PSA sozinho não consegue. Dura poucos segundos e pode salvar vidas.\n\nSe houver suspeita, o próximo passo costuma ser a <strong>biópsia</strong> — retirada de pequenas amostras do tecido para análise. Hoje, a biópsia guiada por ressonância magnética identifica as áreas mais suspeitas com mais precisão. 💙`,
    source: 'INCA · ASCO · Beaba'
  },
  {
    id: 'prostata-estadiamento',
    type: 'prostata',

    typeColor: 'rgb(120 193 233)',
    keys: ['estadiamento prostata','estagio prostata','estágio cancer de prostata','gleason','grupo de grau','metastase prostata','quanto avancou prostata'],
    title: 'Estadiamento do câncer de próstata',
    text: `O estadiamento ajuda a entender o quanto o câncer se desenvolveu e orienta as decisões de tratamento. 💙\n\n🟢 <strong>Estágio I:</strong> tumor pequeno, limitado à próstata, crescimento lento. Muitas vezes não causa sintomas.\n🟡 <strong>Estágio II:</strong> ainda dentro da próstata, mas maior ou com características de crescimento mais rápido.\n🟠 <strong>Estágio III:</strong> o câncer começou a ultrapassar os limites da próstata, podendo atingir vesículas seminais ou tecidos próximos.\n🔴 <strong>Estágio IV:</strong> há metástase — o câncer chegou a linfonodos, ossos ou outros órgãos.\n\nAlém do estágio, o <strong>escore de Gleason</strong> (ou Grupo de Grau) avalia o quão agressivas são as células do tumor. Quanto mais alto o escore, mais rápido o tumor tende a crescer. Essa informação, junto com o PSA e o estadiamento, orienta a escolha do melhor tratamento. 🩺`,
    source: 'INCA · ASCO · Beaba'
  },
  {
    id: 'prostata-tratamento',
    type: 'prostata',
    typeLabel: '💙 Próstata',
    typeColor: 'rgb(120 193 233)',
    keys: ['tratamento prostata','cirurgia prostata','prostatectomia','radioterapia prostata','vigilia ativa','hormonioterapia prostata','quimioterapia prostata','braquiterapia'],
    title: 'Tratamentos do câncer de próstata',
    text: `O tratamento é <strong>individualizado</strong>: tipo de tumor, estágio, idade e preferências pessoais entram na equação. Em muitos casos, mais de uma abordagem é combinada. 💊\n\n<strong>Vigilância ativa:</strong> para tumores de baixo risco e crescimento lento — monitorar com exames regulares sem tratar imediatamente. É uma escolha legítima e segura para muitos casos.\n\n<strong>Cirurgia (prostatectomia radical):</strong> retirada da próstata. Pode ser aberta, laparoscópica ou robótica. Possíveis efeitos: incontinência urinária e disfunção erétil — temporários ou permanentes, com acompanhamento especializado.\n\n<strong>Radioterapia:</strong> externa ou braquiterapia (sementes radioativas colocadas na próstata).\n\n<strong>Hormonioterapia:</strong> reduz a testosterona que alimenta o tumor. Efeitos: ondas de calor, fadiga, alterações de humor — todos merecem cuidado.\n\n<strong>Quimioterapia, terapias-alvo e imunoterapia:</strong> para casos mais avançados ou tumores específicos. 💙`,
    source: 'INCA · ASCO · Beaba'
  },
  {
    id: 'prostata-cuidados',
    type: 'prostata',
    typeLabel: '💙 Próstata',
    typeColor: 'rgb(120 193 233)',
    keys: ['cuidados prostata','vida apos prostata','efeitos colaterais prostata','disfuncao eretil prostata','incontinencia urinaria','fisioterapia pelvica','emocional prostata','rastreamento prostata','prevencao prostata'],
    title: 'Cuidados e rastreamento',
    text: `O cuidado vai além dos medicamentos. 💙\n\n<strong>Rastreamento:</strong> o INCA recomenda que homens a partir dos <strong>50 anos</strong> — ou <strong>45 anos</strong> para homens negros ou com histórico familiar — conversem com o médico sobre PSA e toque retal.\n\n<strong>Fisioterapia pélvica:</strong> aliada importante após a cirurgia. Ajuda a recuperar o controle urinário e pode contribuir para a função sexual.\n\n<strong>Saúde sexual:</strong> mudanças na função erétil e no desejo são reais e afetam a autoestima. Falar sobre isso com a equipe abre caminhos de cuidado que muitos homens desconhecem. Não é preciso silenciar essa parte da vida.\n\n<strong>Saúde emocional:</strong> medo, tristeza, sensação de perda — esses sentimentos são legítimos e merecem espaço. O apoio psicológico faz diferença. 💛\n\n<strong>Alimentação e exercício:</strong> frutas, vegetais, menos gordura saturada e corpo em movimento ajudam na saúde geral e no processo de tratamento.`,
    source: 'INCA · ASCO · Beaba'

// ─── UTILS ───────────────────────────────────────────────────────────────────
function normalize(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[̀-ͯ]/g, '')
    .replace(/[^a-z0-9\s]/g, ' ')
    .replace(/\s+/g, ' ').trim();
}

function findAnswer(input) {
  const q = normalize(input);
  // When a specific filter is active, search type-specific entries first, then geral
  const specific = currentFilter === 'todos' ? knowledge : knowledge.filter(e => e.type === currentFilter);
  const general = currentFilter === 'todos' ? [] : knowledge.filter(e => e.type === 'geral');
  const pool = [...specific, ...general];

  for (const entry of pool) {
    if (entry.keys.some(k => q.includes(normalize(k)))) return entry;
  }
  // broader search: any word overlap
  const words = q.split(' ').filter(w => w.length > 3);
  for (const entry of pool) {
    const entryText = normalize(entry.keys.join(' ') + ' ' + entry.title);
    if (words.some(w => entryText.includes(w))) return entry;
  }
  return null;
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.remove('active');
    b.style.background = '#fff';
    b.style.color = b.dataset.color || '#3bbfce';
  });
  if (btn) {
    btn.classList.add('active');
    const color = btn.dataset.color || '#3bbfce';
    btn.style.background = color;
    btn.style.color = '#fff';
    document.documentElement.style.setProperty('--avatar-color', color);
  }
  renderSuggestions();
}

// Hover: show outline for colored buttons
document.querySelectorAll('.filter-btn').forEach(function(b) {
  const color = b.dataset.color || '#3bbfce';
  b.addEventListener('mouseenter', function() {
    if (!b.classList.contains('active')) {
      b.style.background = '#fff';
      b.style.color = color;
      b.style.opacity = '1';
    }
  });
  b.addEventListener('mouseleave', function() {
    if (!b.classList.contains('active')) applyButtonStyle(b, false);
  });
});

function getFilterColor() {
  const btn = document.querySelector(`.filter-btn[data-filter="${currentFilter}"]`);
  return btn ? (btn.dataset.color || '#3bbfce') : '#3bbfce';
}

function renderSuggestions() {
  const chips = document.getElementById('chips');
  const list = suggestionsByType[currentFilter] || suggestionsByType.todos;
  const color = getFilterColor();
  chips.innerHTML = '';
  list.forEach(function(s) {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = s;
    btn.style.borderColor = color;
    btn.style.color = color;
    btn.addEventListener('click', function() { sendMessage(s); });
    chips.appendChild(btn);
  });
}

function addMessage(text, isUser, tag, tagColor) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${isUser ? 'user' : 'bot'}`;

  let content = '';
  if (!isUser && tag) {
    content += `<span class="cancer-tag" style="background:${tagColor}20;color:${tagColor}">${tag}</span><br>`;
  }
  content += text;

  const color = getFilterColor();
  const userBubbleStyle = isUser ? `style="background:${color}"` : '';
  const avatarBg = isUser ? '#e8f6f8' : color;
  div.innerHTML = `
    <div class="avatar" style="background:${avatarBg}">${isUser ? '👤' : '🐻'}</div>
    <div class="bubble" ${userBubbleStyle}>${content}</div>
  `;
  msgs.appendChild(div);
  if (isUser) {
    msgs.scrollTop = msgs.scrollHeight;
  } else {
    setTimeout(function() { div.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 50);
  }
}

  const msgs = document.getElementById('messages');

  `;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {

function buildBubble(entry) {
  let html = entry.text.replace(/\n/g, '<br>');
  if (entry.image) {
    html += `<img src="${entry.image}" alt="${entry.title}" onerror="this.style.display='none'">`;
  }
  html += `<div class="source">📚 Fonte: ${entry.source}</div>`;
  return html;
}

const LOGGER_URL = 'https://script.google.com/macros/s/AKfycbx2BoTnDsfgbVJ8GxSVJKa9OY6h8qUo7B5nbK_OeZstAs9RGXEH1zyn6WdSGOdDJfQE/exec';

function sendFeedback(pergunta, resposta, feedback) {
  fetch(LOGGER_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ categoria: currentFilter, pergunta, resposta, feedback })
  });
}

async function sendMessage(text) {
  const input = text || document.getElementById('userInput').value.trim();
  if (!input) return;
  document.getElementById('userInput').value = '';

  addMessage(input, true);
  showTyping();

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: input, categoria: currentFilter })
    });

    const data = await response.json();
    removeTyping();

    if (data.error) {
      addMessage('Ops, tive um problema técnico. Tente novamente! 🐻', false, '🌟 Beaba', '#3bbfce');
    } else {
      const replyText = data.reply
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .split('\n').join('<br>');
      addMessage(replyText, false, null, getFilterColor());
      addFeedbackButtons(input, data.reply);
    }
  } catch (err) {
    removeTyping();
    addMessage('Ops, não consegui me conectar agora. Tente novamente! 🐻', false, '🌟 Beaba', '#3bbfce');
  }
}

function handleSend() {
  sendMessage();
}

document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleSend();
